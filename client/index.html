  <body>
    <div id="root">
      <div
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#f8fafc 0%,#eef3f8 100%);font-family:Inter,Segoe UI,Arial,sans-serif;color:#0f172a;">

    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const analyticsWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      const hasAnalyticsEndpoint =
        analyticsEndpoint && !analyticsEndpoint.includes("%VITE_");
      const hasAnalyticsWebsiteId =
        analyticsWebsiteId && !analyticsWebsiteId.includes("%VITE_");

      if (hasAnalyticsEndpoint && hasAnalyticsWebsiteId) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${analyticsEndpoint.replace(/\/$/, "")}/umami`;
        script.dataset.websiteId = analyticsWebsiteId;
        document.body.appendChild(script);
      }
    </script>
  </body>
