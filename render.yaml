# Exported from Render on 2026-04-30T01:17:59Z
version: "1"
projects:
- name: TruckFixr
  environments:
  - name: Production
    services:
    - type: web
      name: TruckFixr-frontend
      runtime: static
      repo: https://github.com/dkwesiga/TruckFixr_Codex
      envVars:
      - key: VITE_APP_ID
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_API_URL
        sync: false
      buildCommand: npm install -g pnpm@10.15.1 && pnpm install --frozen-lockfile
        --reporter=append-only && pnpm build:client
      staticPublishPath: dist/public
      domains:
      - truckfixr.com
      - www.truckfixr.com
      routes:
      - type: rewrite
        source: /*
        destination: /index.html
      autoDeployTrigger: commit
      rootDir: .
    - type: web
      name: truckfixr-api
      runtime: node
      repo: https://github.com/dkwesiga/TruckFixr_Codex
      plan: free
      envVars:
      - key: SIMPLE_TADIS_MODE
        sync: false
      - key: DIAGNOSTIC_REVIEW_MAX_TOKENS
        sync: false
      - key: DIAGNOSTIC_INTAKE_MAX_TOKENS
        sync: false
      - key: DIAGNOSTIC_TIMEOUT_MS
        sync: false
      - key: DIAGNOSTIC_NEW_CAUSE_MIN_CONFIDENCE
        sync: false
      - key: DIAGNOSTIC_CONFIDENCE_THRESHOLD
        sync: false
      - key: OPENROUTER_FALLBACK_MODEL
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: NODE_ENV
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      region: oregon
      buildCommand: npm install -g pnpm@10.15.1 && pnpm install --frozen-lockfile
        --reporter=append-only && pnpm build:server
      startCommand: sh -c "pnpm build:server && node dist/index.js"
      healthCheckPath: /healthz
      autoDeployTrigger: commit
      rootDir: .
